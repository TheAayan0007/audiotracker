
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: transparent; }

  #app {
    min-height: 520px;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .header {
    text-align: center;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 500;
    color: var(--color-text-primary);
    letter-spacing: -0.3px;
  }
  .header p {
    font-size: 14px;
    color: var(--color-text-secondary);
    margin-top: 4px;
  }

  .orb-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .orb {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
    position: relative;
    overflow: visible;
  }
  .orb i { font-size: 40px; color: var(--color-text-secondary); transition: color 0.2s; }
  .orb.listening {
    background: #E6F1FB;
    border-color: #85B7EB;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .orb.listening i { color: #185FA5; }
  .orb.matched { background: #EAF3DE; border-color: #97C459; }
  .orb.matched i { color: #3B6D11; }
  .orb.unknown { background: #FAECE7; border-color: #F0997B; }
  .orb.unknown i { color: #993C1D; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.07); }
  }

  .orb-label {
    font-size: 14px;
    color: var(--color-text-secondary);
    text-align: center;
  }

  .status-card {
    width: 100%;
    max-width: 420px;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1rem 1.25rem;
    min-height: 64px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .status-card i { font-size: 20px; color: var(--color-text-secondary); flex-shrink: 0; }
  .status-card .msg {
    font-size: 14px;
    color: var(--color-text-primary);
    line-height: 1.5;
  }
  .status-card .msg span { color: var(--color-text-secondary); }

  .result-banner {
    width: 100%;
    max-width: 420px;
    border-radius: var(--border-radius-lg);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 12px;
    display: none;
  }
  .result-banner.show { display: flex; }
  .result-banner.matched-bg { background: #EAF3DE; border: 0.5px solid #97C459; }
  .result-banner.unknown-bg { background: #FAECE7; border: 0.5px solid #F0997B; }
  .result-banner i { font-size: 22px; }
  .result-banner.matched-bg i { color: #3B6D11; }
  .result-banner.unknown-bg i { color: #993C1D; }
  .result-banner .btext { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
  .result-banner .bsub { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }

  .save-section {
    width: 100%;
    max-width: 420px;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-lg);
    padding: 1rem 1.25rem;
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .save-section.show { display: flex; }
  .save-section label { font-size: 13px; color: var(--color-text-secondary); }
  .save-section input {
    width: 100%;
    font-size: 14px;
    padding: 8px 10px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
  }
  .save-section input:focus { outline: none; border-color: #378ADD; }
  .save-section button {
    align-self: flex-end;
    padding: 7px 18px;
    font-size: 14px;
    border-radius: var(--border-radius-md);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    border: 0.5px solid var(--color-border-secondary);
    cursor: pointer;
    transition: background 0.15s;
  }
  .save-section button:hover { background: var(--color-background-secondary); }

  .voices-section {
    width: 100%;
    max-width: 420px;
  }
  .voices-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .voices-header h2 { font-size: 16px; font-weight: 500; color: var(--color-text-primary); }
  .voices-header button {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: transparent;
    color: var(--color-text-secondary);
    cursor: pointer;
  }
  .voices-header button:hover { background: var(--color-background-secondary); }

  .voice-list { display: flex; flex-direction: column; gap: 8px; }
  .voice-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 10px 14px;
  }
  .voice-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: #E6F1FB;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    color: #185FA5;
    flex-shrink: 0;
  }
  .voice-name { font-size: 14px; color: var(--color-text-primary); flex: 1; }
  .voice-date { font-size: 12px; color: var(--color-text-secondary); }
  .voice-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--color-text-secondary);
    font-size: 16px;
    padding: 2px;
    line-height: 1;
  }
  .voice-del:hover { color: #E24B4A; }

  .empty-state {
    font-size: 14px;
    color: var(--color-text-secondary);
    text-align: center;
    padding: 1rem;
    border: 0.5px dashed var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
  }

  .enroll-btn {
    width: 100%;
    max-width: 420px;
    padding: 10px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s;
  }
  .enroll-btn:hover { background: var(--color-background-tertiary); }

  .modal-bg {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--border-radius-lg);
    z-index: 10;
  }
  .modal {
    background: var(--color-background-primary);
    border-radius: var(--border-radius-lg);
    padding: 1.5rem;
    width: 340px;
    border: 0.5px solid var(--color-border-secondary);
  }
  .modal h3 { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }
  .modal p { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1rem; line-height: 1.5; }
  .modal-phrase {
    font-size: 15px;
    font-weight: 500;
    color: var(--color-text-primary);
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 10px 14px;
    margin-bottom: 1rem;
    border-left: 3px solid #378ADD;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions button {
    padding: 7px 16px;
    font-size: 14px;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
  }
  .modal-actions button.primary {
    background: #185FA5;
    color: #E6F1FB;
    border-color: #185FA5;
  }
  .modal-actions button.primary:hover { background: #0C447C; }
  .modal-actions button:hover { background: var(--color-background-secondary); }

  .wave-bars {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 28px;
  }
  .wave-bar {
    width: 4px;
    border-radius: 2px;
    background: #378ADD;
    animation: wave 0.9s ease-in-out infinite;
  }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.2s; }
  .wave-bar:nth-child(6) { animation-delay: 0.1s; }
  @keyframes wave {
    0%, 100% { height: 6px; opacity: 0.4; }
    50% { height: 24px; opacity: 1; }
  }
</style>

<div id="app">
  <div class="header">
    <h1><i class="ti ti-fingerprint" aria-hidden="true" style="font-size:20px;vertical-align:-2px;margin-right:6px;color:#185FA5;"></i>Voice ID</h1>
    <p>Identify and save voices — stored only in your browser</p>
  </div>

  <div class="orb-wrap">
    <div class="orb" id="orb" onclick="toggleListen()">
      <i class="ti ti-microphone" id="orbIcon" aria-hidden="true"></i>
    </div>
    <div class="orb-label" id="orbLabel">Tap to speak</div>
  </div>

  <div class="result-banner" id="resultBanner">
    <i class="ti ti-user-check" id="bannerIcon" aria-hidden="true"></i>
    <div>
      <div class="btext" id="bannerName"></div>
      <div class="bsub" id="bannerSub"></div>
    </div>
  </div>

  <div class="save-section" id="saveSection">
    <label><i class="ti ti-user-plus" aria-hidden="true" style="font-size:15px;vertical-align:-2px;margin-right:4px;"></i>Unknown voice — save it as:</label>
    <input type="text" id="nameInput" placeholder="Enter name..." />
    <button onclick="saveVoice()"><i class="ti ti-device-floppy" aria-hidden="true" style="font-size:15px;vertical-align:-2px;margin-right:4px;"></i>Save voice</button>
  </div>

  <div class="voices-section">
    <div class="voices-header">
      <h2>Saved voices</h2>
      <button onclick="openEnrollModal()"><i class="ti ti-plus" aria-hidden="true" style="font-size:13px;vertical-align:-1px;margin-right:4px;"></i>Enroll new</button>
    </div>
    <div class="voice-list" id="voiceList"></div>
  </div>
</div>

<div id="enrollModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;">
  <div class="modal">
    <h3><i class="ti ti-microphone-2" aria-hidden="true" style="font-size:16px;vertical-align:-2px;margin-right:6px;color:#185FA5;"></i>Enroll a voice</h3>
    <p>Enter a name, then read the phrase aloud when prompted.</p>
    <input type="text" id="enrollName" placeholder="Name for this person..." style="width:100%;font-size:14px;padding:8px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);margin-bottom:12px;" />
    <div class="modal-phrase" id="enrollPhrase">"The quick brown fox jumps over the lazy dog"</div>
    <div id="enrollStatus" style="font-size:13px;color:var(--color-text-secondary);margin-bottom:12px;min-height:18px;"></div>
    <div class="modal-actions">
      <button onclick="closeEnrollModal()">Cancel</button>
      <button class="primary" id="enrollBtn" onclick="startEnroll()"><i class="ti ti-microphone" aria-hidden="true" style="font-size:14px;vertical-align:-2px;margin-right:4px;"></i>Record phrase</button>
    </div>
  </div>
</div>

<script>
const PHRASES = [
  '"The quick brown fox jumps over the lazy dog"',
  '"She sells seashells by the seashore"',
  '"How much wood would a woodchuck chuck"',
  '"Peter Piper picked a peck of pickled peppers"'
];

let db;
let mediaRecorder;
let audioChunks = [];
let isListening = false;
let lastUnknownBlob = null;
let enrollRecorder = null;
let enrollChunks = [];

async function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('VoiceIDDB', 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('voices')) {
        d.createObjectStore('voices', { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e);
  });
}

async function getAllVoices() {
  return new Promise((res) => {
    const tx = db.transaction('voices', 'readonly');
    const store = tx.objectStore('voices');
    const req = store.getAll();
    req.onsuccess = () => res(req.result || []);
    req.onerror = () => res([]);
  });
}

async function addVoice(name, blob, features) {
  return new Promise((res) => {
    const tx = db.transaction('voices', 'readwrite');
    const store = tx.objectStore('voices');
    const req = store.add({ name, blob, features, date: new Date().toLocaleDateString() });
    req.onsuccess = () => res(req.result);
    req.onerror = () => res(null);
  });
}

async function deleteVoice(id) {
  return new Promise((res) => {
    const tx = db.transaction('voices', 'readwrite');
    const store = tx.objectStore('voices');
    store.delete(id);
    tx.oncomplete = () => res();
  });
}

async function extractFeatures(blob) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const buf = await blob.arrayBuffer();
  const audio = await ctx.decodeAudioData(buf);
  const data = audio.getChannelData(0);
  const frameSize = 512;
  const features = [];
  for (let i = 0; i < Math.min(data.length - frameSize, 80 * frameSize); i += frameSize) {
    const frame = data.slice(i, i + frameSize);
    const rms = Math.sqrt(frame.reduce((s, v) => s + v * v, 0) / frameSize);
    let zcr = 0;
    for (let j = 1; j < frame.length; j++) {
      if ((frame[j] >= 0) !== (frame[j-1] >= 0)) zcr++;
    }
    let energy = 0;
    for (let j = 0; j < frame.length; j++) energy += frame[j] * frame[j];
    features.push([rms, zcr / frameSize, energy / frameSize]);
  }
  ctx.close();
  if (features.length === 0) return null;
  const mean = features.reduce((a, b) => [a[0]+b[0], a[1]+b[1], a[2]+b[2]], [0,0,0])
    .map(v => v / features.length);
  const variance = features.reduce((a, b) => [
    a[0] + (b[0]-mean[0])**2,
    a[1] + (b[1]-mean[1])**2,
    a[2] + (b[2]-mean[2])**2
  ], [0,0,0]).map(v => v / features.length);
  return [...mean, ...variance];
}

function cosineSim(a, b) {
  if (!a || !b || a.length !== b.length) return 0;
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    na += a[i] * a[i];
    nb += b[i] * b[i];
  }
  if (na === 0 || nb === 0) return 0;
  return dot / (Math.sqrt(na) * Math.sqrt(nb));
}

async function matchVoice(features) {
  const voices = await getAllVoices();
  let best = null, bestScore = -1;
  for (const v of voices) {
    if (!v.features) continue;
    const score = cosineSim(features, v.features);
    if (score > bestScore) { bestScore = score; best = v; }
  }
  return { voice: best, score: bestScore };
}

function setOrb(state) {
  const orb = document.getElementById('orb');
  const icon = document.getElementById('orbIcon');
  orb.className = 'orb' + (state ? ' ' + state : '');
  if (state === 'listening') icon.className = 'ti ti-waveform';
  else if (state === 'matched') icon.className = 'ti ti-user-check';
  else if (state === 'unknown') icon.className = 'ti ti-user-question';
  else icon.className = 'ti ti-microphone';
}

function showBanner(type, name, sub) {
  const b = document.getElementById('resultBanner');
  const bi = document.getElementById('bannerIcon');
  const bn = document.getElementById('bannerName');
  const bs = document.getElementById('bannerSub');
  b.className = 'result-banner show ' + (type === 'matched' ? 'matched-bg' : 'unknown-bg');
  bi.className = 'ti ' + (type === 'matched' ? 'ti-user-check' : 'ti-user-question');
  bn.textContent = name;
  bs.textContent = sub;
}

function hideBanner() {
  document.getElementById('resultBanner').className = 'result-banner';
}

async function toggleListen() {
  if (isListening) {
    stopListening();
    return;
  }
  hideBanner();
  document.getElementById('saveSection').className = 'save-section';
  document.getElementById('nameInput').value = '';
  lastUnknownBlob = null;

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      setOrb('');
      document.getElementById('orbLabel').textContent = 'Analyzing...';
      try {
        const features = await extractFeatures(blob);
        if (!features) {
          document.getElementById('orbLabel').textContent = 'Tap to speak';
          showBanner('unknown', 'No voice detected', 'Try speaking louder or closer');
          setOrb('unknown');
          return;
        }
        const { voice, score } = await matchVoice(features);
        const THRESHOLD = 0.90;
        if (voice && score >= THRESHOLD) {
          setOrb('matched');
          document.getElementById('orbLabel').textContent = 'Voice matched!';
          showBanner('matched', voice.name, 'Confidence: ' + Math.round(score * 100) + '%');
        } else {
          setOrb('unknown');
          document.getElementById('orbLabel').textContent = 'Unknown voice';
          lastUnknownBlob = blob;
          showBanner('unknown', 'Voice not recognised', voice ? ('Closest: ' + voice.name + ' — ' + Math.round(score * 100) + '% similarity') : 'No voices enrolled yet');
          document.getElementById('saveSection').className = 'save-section show';
          setTimeout(() => document.getElementById('nameInput').focus(), 100);
        }
      } catch(err) {
        document.getElementById('orbLabel').textContent = 'Error — try again';
        setOrb('');
      }
    };
    mediaRecorder.start();
    isListening = true;
    setOrb('listening');
    document.getElementById('orbLabel').textContent = 'Listening... tap to stop';
  } catch(err) {
    document.getElementById('orbLabel').textContent = 'Microphone access denied';
  }
}

function stopListening() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isListening = false;
}

async function saveVoice() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { document.getElementById('nameInput').focus(); return; }
  if (!lastUnknownBlob) return;
  const features = await extractFeatures(lastUnknownBlob);
  await addVoice(name, lastUnknownBlob, features);
  document.getElementById('saveSection').className = 'save-section';
  document.getElementById('orbLabel').textContent = 'Tap to speak';
  setOrb('');
  hideBanner();
  lastUnknownBlob = null;
  renderVoiceList();
}

async function renderVoiceList() {
  const list = document.getElementById('voiceList');
  const voices = await getAllVoices();
  if (voices.length === 0) {
    list.innerHTML = '<div class="empty-state"><i class="ti ti-database-off" style="font-size:20px;display:block;margin:0 auto 6px;" aria-hidden="true"></i>No voices saved yet. Tap the mic to start.</div>';
    return;
  }
  list.innerHTML = voices.map(v => {
    const initials = v.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    return `<div class="voice-item">
      <div class="voice-avatar">${initials}</div>
      <div class="voice-name">${v.name}</div>
      <div class="voice-date">${v.date}</div>
      <button class="voice-del" onclick="removeVoice(${v.id})" title="Delete"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>`;
  }).join('');
}

async function removeVoice(id) {
  await deleteVoice(id);
  renderVoiceList();
}

function openEnrollModal() {
  const phrase = PHRASES[Math.floor(Math.random() * PHRASES.length)];
  document.getElementById('enrollPhrase').textContent = phrase;
  document.getElementById('enrollName').value = '';
  document.getElementById('enrollStatus').textContent = '';
  document.getElementById('enrollBtn').textContent = '';
  document.getElementById('enrollBtn').innerHTML = '<i class="ti ti-microphone" aria-hidden="true" style="font-size:14px;vertical-align:-2px;margin-right:4px;"></i>Record phrase';
  document.getElementById('enrollBtn').disabled = false;
  document.getElementById('enrollModal').style.display = 'flex';
}

function closeEnrollModal() {
  if (enrollRecorder && enrollRecorder.state !== 'inactive') enrollRecorder.stop();
  document.getElementById('enrollModal').style.display = 'none';
}

async function startEnroll() {
  const name = document.getElementById('enrollName').value.trim();
  if (!name) { document.getElementById('enrollName').focus(); return; }
  const btn = document.getElementById('enrollBtn');
  const status = document.getElementById('enrollStatus');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    enrollChunks = [];
    enrollRecorder = new MediaRecorder(stream);
    enrollRecorder.ondataavailable = e => { if (e.data.size > 0) enrollChunks.push(e.data); };
    enrollRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      status.textContent = 'Processing voice...';
      const blob = new Blob(enrollChunks, { type: 'audio/webm' });
      const features = await extractFeatures(blob);
      if (!features) {
        status.textContent = 'Could not detect voice. Try again.';
        btn.innerHTML = '<i class="ti ti-microphone" aria-hidden="true" style="font-size:14px;vertical-align:-2px;margin-right:4px;"></i>Record phrase';
        btn.disabled = false;
        return;
      }
      await addVoice(name, blob, features);
      status.textContent = '✓ Voice enrolled!';
      btn.disabled = true;
      renderVoiceList();
      setTimeout(() => closeEnrollModal(), 1000);
    };
    enrollRecorder.start();
    btn.innerHTML = '<i class="ti ti-square" aria-hidden="true" style="font-size:14px;vertical-align:-2px;margin-right:4px;"></i>Stop recording';
    btn.onclick = () => { enrollRecorder.stop(); btn.disabled = true; };
    status.textContent = 'Recording... read the phrase aloud';
  } catch(err) {
    status.textContent = 'Microphone access denied.';
  }
}
